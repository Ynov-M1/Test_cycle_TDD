name: Build, Test, Publish and Deploy React Application

on:
  push:
    branches: [master]

jobs:
  build_test:
    name: Build and Test React App
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: cd app && pnpm exec cypress install

      - name: Generate JSDoc
        run: cd app && pnpm run doc

      - name: Build React App
        run: cd app && pnpm run build

      - name: Run Tests
        run: cd app && pnpm test

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: app
          start: pnpm dev
          wait-on: 'http://localhost:5173/Test_cycle_TDD/'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/coverage/lcov.info
          fail_ci_if_error: 'true'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/dist

  publish-npm:
    name: Publish NPM Package
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Determine if new version
        id: semver
        run: |
          cd app
          set -e

          CURRENT=$(jq -r .version package.json)
          echo "Current version: $CURRENT"

          set +e
          OUTPUT=$(npm view theo_lafond_react_ci_cd version 2>&1)
          STATUS=$?
          set -e

          if [ $STATUS -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "E404"; then
              echo "Package does not exist yet."
              LATEST="0.0.0"
            else
              echo "Unexpected npm error:"
              echo "$OUTPUT"
              exit 1
            fi
          else
            LATEST="$OUTPUT"
          fi

          echo "Latest published version: $LATEST"

          if [ "$(printf '%s\n' "$CURRENT" "$LATEST" | sort -V | head -n1)" = "$LATEST" ] && [ "$CURRENT" != "$LATEST" ]; then
            echo "publish=true" >> $GITHUB_ENV
          else
            echo "publish=false" >> $GITHUB_ENV
          fi

      - name: Configure NPM authentication explicitly
        if: env.publish == 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish package to NPM
        if: env.publish == 'true'
        run: |
          cd app
          pnpm run build-npm
          npm publish --access public

      - name: Skip publishing
        if: env.publish == 'false'
        run: echo "Version already published. Skipping publish."

  publish_api:
    name: Build, Test and Publish FastAPI
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build MySQL image
        run: docker build -t theolafond/migration_mysql:0.0.1 .

      - name: Build FastAPI image
        run: docker build -t theolafond/api_fastapi:0.0.1 ./server

      - name: Run MySQL container
        run: |
          docker run -d \
            --name migration_container \
            -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -e MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }} \
            theolafond/migration_mysql:0.0.1

      - name: Wait MySQL initialization
        run: sleep 15

      - name: Run FastAPI container
        run: |
          docker run -d \
            --name fastAPI \
            -e MYSQL_HOST=172.17.0.1 \
            -e MYSQL_USER=${{ secrets.MYSQL_USER }} \
            -e MYSQL_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -e MYSQL_DB=${{ secrets.MYSQL_DATABASE }} \
            -p 8000:8000 \
            theolafond/api_fastapi:0.0.1

      - name: Test FastAPI /users endpoint
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/users)
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "FastAPI API test failed!"
            docker logs fastAPI
            exit 1
          fi

      - name: Stop containers
        run: docker stop fastAPI migration_container && docker rm fastAPI migration_container

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Push FastAPI image to Docker Hub
        run: docker push theolafond/api_fastapi:0.0.1

  deploy:
    name: Deploy to GitHub Pages
    needs: [build_test, publish-npm, publish_api]
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4