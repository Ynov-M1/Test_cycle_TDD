name: Build, Test, Publish and Deploy React Application

on:
  push:
    branches: [master]

jobs:

  build_test:
    name: Build and Test React App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: |
          cd app
          pnpm install --frozen-lockfile

      - name: Build React App
        run: cd app && pnpm run build

      - name: Run Unit Tests
        run: cd app && pnpm test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/coverage/lcov.info
          fail_ci_if_error: 'true'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/dist

  publish_api:
    name: Build, Test and Publish FastAPI (Docker Compose)
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - uses: actions/checkout@v4

      - name: Create Docker env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=ynov_ci" >> .env

      - name: Create API env file
        run: |
          mkdir -p server
          echo "MYSQL_HOST=db" >> server/.env
          echo "MYSQL_USER=root" >> server/.env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> server/.env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> server/.env
          echo "MYSQL_DATABASE=ynov_ci" >> server/.env

      - name: Build Docker Images
        run: docker compose -f ./docker-compose.yml build

      - name: Launch CI containers and wait for healthchecks
        run: docker compose -f ./docker-compose.yml up -d --wait

      - name: Test API Endpoint
        shell: bash
        run: |
          for i in {1..30}; do
             HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" http://localhost:8000/users || true)
             if [ "$HTTP_CODE" = "200" ]; then break; fi
             echo "Waiting for API... attempt $i/30 (HTTP=$HTTP_CODE)"
             sleep 2
           done
          if [ "$HTTP_CODE" != "200" ]; then
             echo "API did not return HTTP 200."
             [ -f response.json ] && cat response.json || true
             docker logs fastAPI || true
             exit 1
          fi
          USERS_COUNT=$(jq '.utilisateurs | length' response.json)
          if [ -z "$USERS_COUNT" ] || [ "$USERS_COUNT" -le 0 ]; then
             echo "Endpoint returned an empty users list."
             cat response.json
             exit 1
          fi
          echo "Validation passed with $USERS_COUNT users."

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push FastAPI image to Docker Hub
        run: docker compose -f ./docker-compose.yml push api

      - name: Run Cypress normal tests
        run: |
          cd app
          pnpm install --frozen-lockfile
          pnpm exec cypress install
          pnpm run cy:normal

      - name: Stop API container
        run: docker compose -f ./docker-compose.yml stop api

      - name: Run Cypress server-error tests
        run: |
          cd app
          pnpm run cy:server-error

      - name: Stop and remove CI containers
        if: always()
        run: docker compose -f ./docker-compose.yml down

  publish_npm:
    name: Publish NPM Package
    runs-on: ubuntu-latest
    needs: [build_test, publish_api]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Determine if new version
        id: semver
        run: |
          cd app
          set -e
          CURRENT=$(jq -r .version package.json)
          echo "Current version: $CURRENT"
          set +e
          OUTPUT=$(npm view theo_lafond_react_ci_cd version 2>&1)
          STATUS=$?
          set -e
          if [ $STATUS -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "E404"; then
              LATEST="0.0.0"
            else
              echo "Unexpected npm error:"; echo "$OUTPUT"; exit 1
            fi
          else
            LATEST="$OUTPUT"
          fi
          echo "Latest published version: $LATEST"
          if [ "$(printf '%s\n' "$CURRENT" "$LATEST" | sort -V | head -n1)" = "$LATEST" ] && [ "$CURRENT" != "$LATEST" ]; then
            echo "publish=true" >> $GITHUB_ENV
          else
            echo "publish=false" >> $GITHUB_ENV
          fi

      - name: Configure NPM authentication explicitly
        if: env.publish == 'true'
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish package to NPM
        if: env.publish == 'true'
        run: |
          cd app
          pnpm run build-npm
          npm publish --access public

      - name: Skip publishing
        if: env.publish == 'false'
        run: echo "Version already published. Skipping publish."

  deploy:
    name: Deploy to GitHub Pages
    needs: [publish_npm, publish_api]
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4